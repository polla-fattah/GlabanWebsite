<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#F5F6F4; }
  a { color:#E2861B; }
  a:hover { color:#C96F0F; }
</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif">
<dc-import name="Header" hint-size="100%,76px"></dc-import>

<section style="background:#0A1930;padding:72px 32px 56px">
  <div style="max-width:1280px;margin:0 auto">
    <div style="font-size:13px;font-weight:600;color:#F0A85B;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">FAQ</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:#fff;margin:0 0 12px">Frequently asked questions</h1>
  </div>
</section>

<section style="max-width:840px;margin:0 auto;padding:64px 32px 96px">
  <sc-for list="{{ faqs }}" as="f" hint-placeholder-count="18">
    <div style="border-bottom:1px solid rgba(10,25,48,.1);padding:20px 0">
      <div onClick="{{ toggle($index) }}" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:16px">
        <div style="font-weight:600;font-size:16px;color:#16212B">{{ f.q }}</div>
        <div style="{{ iconStyle($index) }}">+</div>
      </div>
      <sc-if value="{{ isOpen($index) }}" hint-placeholder-val="{{ false }}">
        <p style="font-size:14.5px;color:#59677A;line-height:1.65;margin:14px 0 0">{{ f.a }}</p>
      </sc-if>
    </div>
  </sc-for>
</section>

<section style="background:#EFF1EE">
  <div style="max-width:1280px;margin:0 auto;padding:64px 32px;text-align:center">
    <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#16212B;margin:0 0 14px">Still have questions?</h2>
    <a href="Contact.dc.html" style="display:inline-block;background:#E2861B;color:#0A1930;font-weight:600;font-size:15px;padding:14px 26px;border-radius:8px;text-decoration:none">Contact Us</a>
  </div>
</section>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { openIndex: 0 };

  toggle = (i) => () => this.setState(s => ({ openIndex: s.openIndex === i ? -1 : i }));
  isOpen = (i) => this.state.openIndex === i;
  iconStyle = (i) => `width:26px;height:26px;border-radius:50%;background:#FDF1E2;color:#C96F0F;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;transform:rotate(${this.state.openIndex === i ? 45 : 0}deg);transition:transform .15s`;

  faqs = [
    { q: 'Do you provide ready-made systems or custom systems?', a: 'Both. We offer ready-made products for common fuel-sector workflows, and can customise or build new modules for your specific needs.' },
    { q: 'Can the ERP be customised for our company?', a: 'Yes. The Fuel ERP Platform can be configured and extended to match your branches, products, and reporting requirements.' },
    { q: 'Do you support gas station POS?', a: 'Yes, our Gas Station POS System covers sales, shift management, cashier control, and daily closing.' },
    { q: 'Can your system manage employee fuel limits?', a: 'Yes, the Employee Fuel Limit & Quota System supports limits by employee, vehicle, department, or branch.' },
    { q: 'Can your system support fuel cards?', a: 'Yes, our Fuel Card & Fleet Card System supports customer, driver, vehicle, and company fleet cards.' },
    { q: 'Can your system track propane cylinders?', a: 'Yes, Propane Cylinder Management tracks inventory, deposits, returns, and missing cylinders.' },
    { q: 'Can your system manage delivery by tonnes?', a: 'Yes, the Bulk Gas Delivery System manages tonnage-based contracts, scheduling, and invoicing.' },
    { q: 'Do you provide location-based task management?', a: 'Yes, our Location-Based Task Management product assigns and verifies field tasks by GPS location.' },
    { q: 'Do you install CCTV and surveillance systems?', a: 'Yes, we install and configure CCTV, IP cameras, NVR/DVR systems, and central monitoring dashboards.' },
    { q: 'Do you provide access control systems?', a: 'Yes, including staff access cards, biometric attendance, and door/gate access control.' },
    { q: 'Do you provide cybersecurity services?', a: 'Yes, covering website security, server hardening, access control review, and industrial/OT cybersecurity assessment.' },
    { q: 'Do you provide hosting and maintenance?', a: 'Yes, including VPS/cloud hosting, SSL, backups, disaster recovery, and ongoing maintenance packages.' },
    { q: 'Can the system work for multiple branches?', a: 'Yes, our ERP, POS, and dashboard products are designed for multi-branch operations from the start.' },
    { q: 'Do you provide training?', a: 'Yes, we provide role-based training for owners, managers, cashiers, drivers, and IT staff, on-site or remote.' },
    { q: 'Can the system support Kurdish, Arabic, and English?', a: 'The first version launches in English. Kurdish Sorani and Arabic support are planned for future phases.' },
    { q: 'Can the system work with low internet connectivity?', a: 'Our POS and field applications are designed with offline or low-connectivity scenarios in mind.' },
    { q: 'Do you provide reports for owners and managers?', a: 'Yes, our Business Intelligence Dashboard consolidates sales, delivery, security, and maintenance reporting.' },
    { q: 'Can we start with one product and expand later?', a: 'Yes, most customers start with one product, such as POS or ERP, and expand into other modules over time.' },
  ];

  renderVals() {
    return {
      faqs: this.faqs,
      toggle: this.toggle,
      isOpen: this.isOpen,
      iconStyle: this.iconStyle,
    };
  }
}

</script>
</body>
</html>
