<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#F5F6F4; }
  a { color:#E2861B; }
  a:hover { color:#C96F0F; }
  .glb-input, .glb-select, .glb-textarea { width:100%; box-sizing:border-box; font-family:'IBM Plex Sans',sans-serif; font-size:14.5px; padding:12px 14px; border-radius:8px; border:1px solid rgba(10,25,48,.15); background:#fff; color:#16212B; }
  .glb-input:focus, .glb-select:focus, .glb-textarea:focus { outline:none; border-color:#E2861B; }
  .glb-label { font-size:13px; font-weight:600; color:#3E4C59; margin-bottom:6px; display:block; }
</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif">
<dc-import name="Header" hint-size="100%,76px"></dc-import>

<section style="background:#0A1930;padding:72px 32px 56px">
  <div style="max-width:1280px;margin:0 auto">
    <div style="font-size:13px;font-weight:600;color:#F0A85B;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">Support</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:#fff;margin:0 0 16px;max-width:720px;line-height:1.2">We're here after go-live</h1>
    <p style="font-size:17px;color:rgba(255,255,255,.65);max-width:640px;line-height:1.6;margin:0">Reach our support team directly, or submit a request below.</p>
  </div>
</section>

<section style="max-width:1280px;margin:0 auto;padding:64px 32px 96px;display:grid;grid-template-columns:.9fr 1.1fr;gap:48px">
  <div>
    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:32px">
      <sc-for list="{{ channels }}" as="c" hint-placeholder-count="4">
        <div style="background:#fff;border:1px solid rgba(10,25,48,.08);border-radius:12px;padding:20px">
          <div style="font-weight:700;font-size:15px;color:#16212B;margin-bottom:4px">{{ c.label }}</div>
          <div style="font-size:14px;color:#59677A">{{ c.value }}</div>
        </div>
      </sc-for>
    </div>
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#16212B;margin-bottom:14px">What we cover</div>
    <div style="display:flex;flex-direction:column;gap:9px">
      <sc-for list="{{ covered }}" as="i" hint-placeholder-count="9">
        <div style="display:flex;gap:9px;align-items:flex-start"><span style="color:#1F9D6E;font-size:13px;margin-top:2px">✓</span><span style="font-size:14px;color:#3E4C59">{{ i }}</span></div>
      </sc-for>
    </div>
  </div>

  <div style="background:#fff;border:1px solid rgba(10,25,48,.08);border-radius:16px;padding:36px">
    <sc-if value="{{ !submitted }}" hint-placeholder-val="{{ true }}">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#16212B;margin-bottom:22px">Submit a support request</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><label class="glb-label">Company Name *</label><input class="glb-input" value="{{ form.company }}" onChange="{{ setField('company') }}"/></div>
        <div><label class="glb-label">Contact Person *</label><input class="glb-input" value="{{ form.contact }}" onChange="{{ setField('contact') }}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><label class="glb-label">Phone Number *</label><input class="glb-input" value="{{ form.phone }}" onChange="{{ setField('phone') }}"/></div>
        <div><label class="glb-label">Email *</label><input class="glb-input" value="{{ form.email }}" onChange="{{ setField('email') }}"/></div>
      </div>
      <div style="margin-bottom:16px"><label class="glb-label">Product or System</label>
        <select class="glb-select" value="{{ form.product }}" onChange="{{ setField('product') }}">
          <sc-for list="{{ productOptions }}" as="o" hint-placeholder-count="6"><option value="{{ o }}">{{ o }}</option></sc-for>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><label class="glb-label">Issue Type</label>
          <select class="glb-select" value="{{ form.issueType }}" onChange="{{ setField('issueType') }}">
            <sc-for list="{{ issueTypes }}" as="o" hint-placeholder-count="4"><option value="{{ o }}">{{ o }}</option></sc-for>
          </select>
        </div>
        <div><label class="glb-label">Urgency</label>
          <select class="glb-select" value="{{ form.urgency }}" onChange="{{ setField('urgency') }}">
            <sc-for list="{{ urgencyLevels }}" as="o" hint-placeholder-count="3"><option value="{{ o }}">{{ o }}</option></sc-for>
          </select>
        </div>
      </div>
      <div style="margin-bottom:22px"><label class="glb-label">Issue Description *</label><textarea class="glb-textarea" rows="4" value="{{ form.description }}" onChange="{{ setField('description') }}"></textarea></div>
      <sc-if value="{{ error }}" hint-placeholder-val="{{ false }}">
        <div style="color:#C0392B;font-size:13.5px;margin-bottom:14px">{{ error }}</div>
      </sc-if>
      <button onClick="{{ handleSubmit }}" style="background:#E2861B;color:#0A1930;font-weight:600;font-size:15px;padding:14px 26px;border-radius:8px;border:none;cursor:pointer">Submit Request</button>
    </sc-if>
    <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;padding:40px 0">
        <div style="width:52px;height:52px;border-radius:50%;background:#E9F5EF;color:#1F9D6E;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 18px">✓</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;color:#16212B;margin-bottom:8px">Request received</div>
        <p style="font-size:14.5px;color:#59677A;margin:0">Our support team will contact you shortly.</p>
      </div>
    </sc-if>
  </div>
</section>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    form: { company: '', contact: '', phone: '', email: '', product: 'Fuel ERP', issueType: 'Technical Issue', urgency: 'Normal', description: '' },
    submitted: false,
    error: '',
  };

  setField = (key) => (e) => {
    const value = e && e.target ? e.target.value : e;
    this.setState(s => ({ form: { ...s.form, [key]: value } }));
  };

  handleSubmit = () => {
    const f = this.state.form;
    if (!f.company || !f.contact || !f.phone || !f.email || !f.description) {
      this.setState({ error: 'Please fill in all required fields.' });
      return;
    }
    this.setState({ submitted: true, error: '' });
  };

  renderVals() {
    return {
      form: this.state.form,
      submitted: this.state.submitted,
      error: this.state.error,
      setField: this.setField,
      handleSubmit: this.handleSubmit,
      productOptions: ['Fuel ERP', 'Gas Station POS', 'Fuel Card / Fleet Card', 'Fuel Limit / Quota', 'Propane Cylinder System', 'Other'],
      issueTypes: ['Technical Issue', 'Bug Report', 'Training Request', 'Other'],
      urgencyLevels: ['Low', 'Normal', 'High / Emergency'],
      channels: [
        { label: 'Support Email', value: 'support@glaban.com' },
        { label: 'Support Phone', value: '+964 750 000 0001' },
        { label: 'Working Hours', value: 'Sat–Thu, 8:00–18:00' },
        { label: 'Emergency Support', value: 'Available for critical outages' },
      ],
      covered: [
        'Support channels and working hours', 'Maintenance options', 'Update policy', 'Bug reporting',
        'Training support', 'Emergency support', 'Hosting support', 'Backup and restore support',
      ],
    };
  }
}

</script>
</body>
</html>
