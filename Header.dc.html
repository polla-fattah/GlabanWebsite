<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  @keyframes glbMenuIn { from { opacity:0; transform:translateY(-8px);} to { opacity:1; transform:translateY(0);} }
</style>
</helmet>
<header style="position:sticky;top:0;z-index:100;background:#0A1930;border-bottom:1px solid rgba(255,255,255,.08)">
  <div style="max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:76px">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <div style="width:34px;height:34px;border-radius:7px;background:linear-gradient(135deg,#E2861B,#C96F0F);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;color:#0A1930;font-size:17px">G</div>
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#fff;letter-spacing:.2px">GLABAN</span>
    </a>
    <nav style="display:flex;align-items:center;gap:28px" class="glb-desktop-nav">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="8">
        <a href="{{ item.href }}" style="{{ item.linkStyleStr }}">{{ item.label }}</a>
      </sc-for>
    </nav>
    <div style="display:flex;align-items:center;gap:16px">
      <a href="Contact.dc.html" class="glb-desktop-nav" style="background:#E2861B;color:#0A1930;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:14.5px;padding:11px 22px;border-radius:7px;text-decoration:none;white-space:nowrap" style-hover="background:#F09A3C">Contact Us</a>
      <button onClick="{{ toggleMobile }}" aria-label="Menu" class="glb-mobile-btn" style="display:none;background:none;border:none;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer">
        <div style="display:flex;flex-direction:column;gap:5px">
          <span style="width:22px;height:2px;background:#fff;display:block"></span>
          <span style="width:22px;height:2px;background:#fff;display:block"></span>
          <span style="width:22px;height:2px;background:#fff;display:block"></span>
        </div>
      </button>
    </div>
  </div>
  <sc-if value="{{ mobileOpen }}" hint-placeholder-val="{{ false }}">
    <div style="animation:glbMenuIn .15s ease;background:#0A1930;border-top:1px solid rgba(255,255,255,.08);padding:8px 24px 20px;display:flex;flex-direction:column;gap:2px">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="8">
        <a href="{{ item.href }}" style="{{ item.mobileLinkStyleStr }}">{{ item.label }}</a>
      </sc-for>
      <a href="Contact.dc.html" style="margin-top:12px;background:#E2861B;color:#0A1930;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:15px;padding:12px 22px;border-radius:7px;text-decoration:none;text-align:center">Contact Us</a>
    </div>
  </sc-if>
  <style>
    @media (max-width: 1180px) {
      .glb-desktop-nav { display: none !important; }
      .glb-mobile-btn { display: flex !important; }
    }
  </style>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:76},&quot;activePage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;products&quot;,&quot;services&quot;,&quot;industries&quot;,&quot;solutions&quot;,&quot;cybersecurity&quot;,&quot;cctv&quot;,&quot;about&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { mobileOpen: false };

  toggleMobile = () => this.setState(s => ({ mobileOpen: !s.mobileOpen }));

  navItems = [
    { label: 'Home', href: 'Home.dc.html', key: 'home' },
    { label: 'Products', href: 'Products.dc.html', key: 'products' },
    { label: 'Services', href: 'Services.dc.html', key: 'services' },
    { label: 'Industries', href: 'Industries.dc.html', key: 'industries' },
    { label: 'About', href: 'About.dc.html', key: 'about' },
  ];

  linkStyle(item) {
    const active = item.key === this.props.activePage;
    return `font-family:'IBM Plex Sans',sans-serif;font-size:14.5px;font-weight:${active ? 600 : 500};color:${active ? '#fff' : 'rgba(255,255,255,.65)'};text-decoration:none;padding-bottom:4px;border-bottom:2px solid ${active ? '#E2861B' : 'transparent'};white-space:nowrap`;
  }

  mobileLinkStyle(item) {
    const active = item.key === this.props.activePage;
    return `font-family:'IBM Plex Sans',sans-serif;font-size:15.5px;font-weight:${active ? 600 : 500};color:${active ? '#E2861B' : 'rgba(255,255,255,.8)'};text-decoration:none;padding:12px 4px;border-bottom:1px solid rgba(255,255,255,.06)`;
  }

  renderVals() {
    const navItems = this.navItems.map(item => ({
      ...item,
      linkStyleStr: this.linkStyle(item),
      mobileLinkStyleStr: this.mobileLinkStyle(item),
    }));
    return {
      navItems,
      mobileOpen: this.state.mobileOpen,
      toggleMobile: this.toggleMobile,
    };
  }
}

</script>
</body>
</html>
