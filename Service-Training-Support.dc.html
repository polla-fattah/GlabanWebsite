<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{margin:0;background:#F5F6F4}a{color:#E2861B}a:hover{color:#C96F0F}</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif">
<dc-import name="Header" active-page="services" hint-size="100%,76px"></dc-import>
<section style="background:#0A1930;padding:72px 32px 64px">
  <div style="max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center">
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <div style="width:44px;height:44px;border-radius:10px;background:rgba(226,134,27,.18);display:flex;align-items:center;justify-content:center;font-size:20px"><i class="fa-solid fa-chalkboard-user" style="color:#F0A85B"></i></div>
        <div style="font-size:13px;font-weight:600;color:#F0A85B;letter-spacing:.06em;text-transform:uppercase">Service · Enablement</div>
      </div>
      <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:38px;color:#fff;margin:0 0 16px;max-width:680px;line-height:1.2">Training &amp; Support</h1>
      <p style="font-size:16.5px;color:rgba(255,255,255,.65);max-width:620px;line-height:1.65;margin:0">Role-based training for every user, from owners to drivers, on-site or remote.</p>
    </div>
    <a href="Contact.dc.html" style="background:#E2861B;color:#0A1930;font-weight:600;font-size:15px;padding:14px 26px;border-radius:8px;text-decoration:none;white-space:nowrap">Request Consultation</a>
  </div>
</section>
<section style="max-width:1280px;margin:0 auto;padding:72px 32px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:56px">
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#16212B;margin-bottom:18px">Who we train</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <sc-for list="{{ roles }}" as="r" hint-placeholder-count="9">
          <span style="background:#FDF1E2;color:#C96F0F;font-size:13px;font-weight:600;padding:7px 14px;border-radius:16px">{{ r }}</span>
        </sc-for>
      </div>
    </div>
    <div>
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;color:#16212B;margin-bottom:18px">What's included</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{ items }}" as="i" hint-placeholder-count="7">
          <div style="display:flex;gap:9px;align-items:flex-start"><span style="color:#1F9D6E;font-size:13px;margin-top:2px">✓</span><span style="font-size:14px;color:#3E4C59">{{ i }}</span></div>
        </sc-for>
      </div>
    </div>
  </div>
</section>
<section style="background:#EFF1EE">
  <div style="max-width:1280px;margin:0 auto;padding:72px 32px;text-align:center">
    <h2 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:#16212B;margin:0 0 14px">Get your team confident on day one</h2>
    <a href="Contact.dc.html" style="display:inline-block;background:#E2861B;color:#0A1930;font-weight:600;font-size:15px;padding:14px 26px;border-radius:8px;text-decoration:none">Contact Us</a>
  </div>
</section>
<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      roles: ['Owners', 'Managers', 'Accountants', 'Cashiers', 'Drivers', 'Field employees', 'Security staff', 'IT staff', 'Admin users'],
      items: ['User training', 'Admin training', 'On-site support direction', 'Remote support direction', 'Maintenance packages', 'Support request process', 'Emergency support direction'],
    };
  }
}

</script>
</body>
</html>
