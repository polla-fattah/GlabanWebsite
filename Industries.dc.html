<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#F5F6F4; }
  a { color:#E2861B; }
  a:hover { color:#C96F0F; }
</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif">
<dc-import name="Header" active-page="industries" hint-size="100%,76px"></dc-import>

<section style="background:#0A1930;padding:72px 32px 56px">
  <div style="max-width:1280px;margin:0 auto">
    <div style="font-size:13px;font-weight:600;color:#7FD8B0;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">Industries</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:#fff;margin:0 0 16px;max-width:720px;line-height:1.2">Built for every part of the fuel and energy value chain</h1>
    <p style="font-size:17px;color:rgba(255,255,255,.65);max-width:640px;line-height:1.6;margin:0">Each industry has different operational risks. We tailor products and services to match.</p>
  </div>
</section>

<section style="max-width:1280px;margin:0 auto;padding:64px 32px 96px;display:flex;flex-direction:column;gap:20px">
  <sc-for list="{{ industries }}" as="ind" hint-placeholder-count="10">
    <div style="background:#fff;border:1px solid rgba(10,25,48,.08);border-radius:16px;padding:36px;display:grid;grid-template-columns:.6fr 1.4fr;gap:36px">
      <div>
        <div style="width:46px;height:46px;border-radius:10px;background:#E9F5EF;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:16px">{{ ind.icon }}</div>
        <div style="font-weight:700;font-size:21px;color:#16212B;margin-bottom:10px">{{ ind.name }}</div>
        <div style="font-size:14.5px;color:#59677A;line-height:1.6">{{ ind.desc }}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <div style="font-size:12px;font-weight:600;color:#C96F0F;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px">Common Problems</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <sc-for list="{{ ind.problems }}" as="pr" hint-placeholder-count="3">
              <div style="font-size:14px;color:#3E4C59;line-height:1.5">• {{ pr }}</div>
            </sc-for>
          </div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:600;color:#1F9D6E;letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px">Recommended</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <sc-for list="{{ ind.recs }}" as="r" hint-placeholder-count="3">
              <div style="font-size:14px;color:#3E4C59;line-height:1.5">• {{ r }}</div>
            </sc-for>
          </div>
          <a href="Contact.dc.html" style="display:inline-block;margin-top:14px;font-size:13.5px;font-weight:600;color:#E2861B;text-decoration:none">Talk to us about {{ ind.name }} →</a>
        </div>
      </div>
    </div>
  </sc-for>
</section>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      industries: [
        { icon: '🛢️', name: 'Oil Companies', desc: 'Multi-branch operations needing central visibility and secure systems.', problems: ['Fragmented branch reporting', 'Weak cybersecurity posture', 'Manual reconciliation'], recs: ['Fuel ERP Platform', 'Business Intelligence Dashboard', 'Cybersecurity Services'] },
        { icon: '🏭', name: 'Refineries', desc: 'Large industrial sites with critical infrastructure and OT exposure.', problems: ['Untracked maintenance', 'OT and network exposure', 'Limited site security'], recs: ['Asset & Maintenance Management', 'Industrial & OT Cybersecurity', 'CCTV & Physical Security'] },
        { icon: '⛽', name: 'Gas Stations', desc: 'High-volume forecourt sales needing fast, reliable POS and monitoring.', problems: ['Cashier discrepancies', 'No forecourt visibility', 'Weak station security'], recs: ['Gas Station POS', 'Forecourt Management', 'CCTV & Surveillance'] },
        { icon: '🚛', name: 'Fuel Distribution Companies', desc: 'Companies moving fuel across branches, depots, and customer sites.', problems: ['Poor delivery visibility', 'Manual invoicing', 'Driver accountability'], recs: ['Delivery Dispatch & Route Optimisation', 'Fleet & Vehicle Tracking', 'Fuel ERP Platform'] },
        { icon: '🛢️', name: 'Propane Cylinder Companies', desc: 'Home and business cylinder delivery with deposit and return tracking.', problems: ['Lost or unreturned cylinders', 'Manual order taking', 'Poor delivery accountability'], recs: ['Propane Cylinder Management', 'Customer Portal & Mobile App', 'Delivery Dispatch'] },
        { icon: '🚚', name: 'Bulk Gas Delivery Companies', desc: 'Contract-based delivery by tonnage to industrial and business customers.', problems: ['Contract tracking gaps', 'Manual consumption reports', 'Delivery confirmation delays'], recs: ['Bulk Gas Delivery System', 'Business Intelligence Dashboard', 'Fleet & Vehicle Tracking'] },
        { icon: '🏗️', name: 'Fuel Depots', desc: 'Storage and transfer sites requiring strict stock and security control.', problems: ['Stock discrepancies', 'Limited perimeter security', 'Manual stock transfers'], recs: ['Fuel ERP Platform', 'CCTV & Physical Security', 'Access Control & Attendance'] },
        { icon: '🏢', name: 'Industrial Gas Customers', desc: 'Businesses consuming gas at scale needing consumption visibility.', problems: ['No consumption tracking', 'Manual billing disputes', 'Delivery scheduling gaps'], recs: ['Bulk Gas Delivery System', 'Customer Portal & Mobile App', 'Business Intelligence Dashboard'] },
        { icon: '📐', name: 'Companies with Employee Fuel Limits', desc: 'Organisations managing fuel allowances across staff, vehicles, or departments.', problems: ['Uncontrolled fuel spending', 'No approval workflow', 'Limited usage reporting'], recs: ['Employee Fuel Limit & Quota System', 'Fuel Card & Fleet Card System', 'Business Intelligence Dashboard'] },
        { icon: '🏛️', name: 'Government / Regulated Fuel Operations', desc: 'Operations subject to strict compliance, audit, and security requirements.', problems: ['Audit and compliance gaps', 'Weak access control', 'Limited reporting transparency'], recs: ['Fuel ERP Platform', 'Access Control & Attendance', 'Cybersecurity Services'] },
      ],
    };
  }
}

</script>
</body>
</html>
