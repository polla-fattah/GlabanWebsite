<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#F5F6F4; }
  a { color:#E2861B; }
  a:hover { color:#C96F0F; }
  .glb-input, .glb-select, .glb-textarea { width:100%; box-sizing:border-box; font-family:'IBM Plex Sans',sans-serif; font-size:14.5px; padding:12px 14px; border-radius:8px; border:1px solid rgba(10,25,48,.15); background:#fff; color:#16212B; }
  .glb-input:focus, .glb-select:focus, .glb-textarea:focus { outline:none; border-color:#E2861B; }
  .glb-label { font-size:13px; font-weight:600; color:#3E4C59; margin-bottom:6px; display:block; }
</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif">
<dc-import name="Header" active-page="contact" hint-size="100%,76px"></dc-import>

<section style="background:#0A1930;padding:72px 32px 56px">
  <div style="max-width:1280px;margin:0 auto">
    <div style="font-size:13px;font-weight:600;color:#F0A85B;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">Contact</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:#fff;margin:0 0 16px;max-width:640px;line-height:1.2">Let's talk about your operation</h1>
    <p style="font-size:17px;color:rgba(255,255,255,.65);max-width:600px;line-height:1.6;margin:0">Tell us about your business and what you need — we'll follow up within one business day.</p>
  </div>
</section>

<section style="max-width:1280px;margin:0 auto;padding:64px 32px 96px;display:grid;grid-template-columns:.85fr 1.15fr;gap:48px">
  <div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <sc-for list="{{ info }}" as="c" hint-placeholder-count="5">
        <div style="background:#fff;border:1px solid rgba(10,25,48,.08);border-radius:12px;padding:20px">
          <div style="font-weight:700;font-size:15px;color:#16212B;margin-bottom:4px">{{ c.label }}</div>
          <div style="font-size:14px;color:#59677A">{{ c.value }}</div>
        </div>
      </sc-for>
    </div>
  </div>

  <div style="background:#fff;border:1px solid rgba(10,25,48,.08);border-radius:16px;padding:36px">
    <sc-if value="{{ !submitted }}" hint-placeholder-val="{{ true }}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><label class="glb-label">Full Name *</label><input class="glb-input" value="{{ form.name }}" onChange="{{ setField('name') }}"/></div>
        <div><label class="glb-label">Company Name *</label><input class="glb-input" value="{{ form.company }}" onChange="{{ setField('company') }}"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><label class="glb-label">Job Title</label><input class="glb-input" value="{{ form.title }}" onChange="{{ setField('title') }}"/></div>
        <div><label class="glb-label">Phone Number *</label><input class="glb-input" value="{{ form.phone }}" onChange="{{ setField('phone') }}"/></div>
      </div>
      <div style="margin-bottom:16px"><label class="glb-label">Email Address *</label><input class="glb-input" value="{{ form.email }}" onChange="{{ setField('email') }}"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div><label class="glb-label">Industry Type</label>
          <select class="glb-select" value="{{ form.industry }}" onChange="{{ setField('industry') }}">
            <sc-for list="{{ industryOptions }}" as="o" hint-placeholder-count="10"><option value="{{ o }}">{{ o }}</option></sc-for>
          </select>
        </div>
        <div><label class="glb-label">Product / Service of Interest</label>
          <select class="glb-select" value="{{ form.interest }}" onChange="{{ setField('interest') }}">
            <sc-for list="{{ interestOptions }}" as="o" hint-placeholder-count="16"><option value="{{ o }}">{{ o }}</option></sc-for>
          </select>
        </div>
      </div>
      <div style="margin-bottom:16px"><label class="glb-label">Preferred Contact Method</label>
        <select class="glb-select" value="{{ form.contactMethod }}" onChange="{{ setField('contactMethod') }}">
          <sc-for list="{{ contactMethods }}" as="o" hint-placeholder-count="3"><option value="{{ o }}">{{ o }}</option></sc-for>
        </select>
      </div>
      <div style="margin-bottom:22px"><label class="glb-label">Message *</label><textarea class="glb-textarea" rows="4" value="{{ form.message }}" onChange="{{ setField('message') }}"></textarea></div>
      <sc-if value="{{ error }}" hint-placeholder-val="{{ false }}">
        <div style="color:#C0392B;font-size:13.5px;margin-bottom:14px">{{ error }}</div>
      </sc-if>
      <button onClick="{{ handleSubmit }}" style="background:#E2861B;color:#0A1930;font-weight:600;font-size:15px;padding:14px 26px;border-radius:8px;border:none;cursor:pointer">Send Message</button>
    </sc-if>
    <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;padding:50px 0">
        <div style="width:52px;height:52px;border-radius:50%;background:#E9F5EF;color:#1F9D6E;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 18px">✓</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;color:#16212B;margin-bottom:8px">Message sent</div>
        <p style="font-size:14.5px;color:#59677A;margin:0">Thanks for reaching out — our team will contact you within one business day.</p>
      </div>
    </sc-if>
  </div>
</section>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    form: { name: '', company: '', title: '', phone: '', email: '', industry: 'Oil company', interest: 'Consultation', contactMethod: 'Email', message: '' },
    submitted: false,
    error: '',
  };

  setField = (key) => (e) => {
    const value = e && e.target ? e.target.value : e;
    this.setState(s => ({ form: { ...s.form, [key]: value } }));
  };

  handleSubmit = () => {
    const f = this.state.form;
    if (!f.name || !f.company || !f.phone || !f.email || !f.message) {
      this.setState({ error: 'Please fill in all required fields.' });
      return;
    }
    this.setState({ submitted: true, error: '' });
  };

  renderVals() {
    return {
      form: this.state.form,
      submitted: this.state.submitted,
      error: this.state.error,
      setField: this.setField,
      handleSubmit: this.handleSubmit,
      industryOptions: ['Oil company', 'Refinery', 'Gas station', 'Propane cylinder company', 'Bulk gas delivery company', 'Fuel distribution company', 'Fuel depot', 'Industrial gas customer', 'Company with employee fuel limits', 'Other'],
      interestOptions: ['Fuel ERP', 'Gas Station POS', 'Forecourt Management', 'Fuel Card / Fleet Card System', 'Fuel Limit / Quota System', 'Propane Cylinder System', 'Bulk Gas Delivery System', 'Delivery Dispatch', 'Location-Based Task Management', 'CCTV and Surveillance', 'Access Control', 'Cybersecurity', 'Fleet Tracking', 'Hosting and Maintenance', 'Custom Software', 'Consultation'],
      contactMethods: ['Email', 'Phone', 'WhatsApp'],
      info: [
        { label: 'Company', value: 'Glaban' },
        { label: 'Phone', value: '+964 750 000 0000' },
        { label: 'Email', value: 'info@glaban.com' },
        { label: 'Office', value: 'Erbil, Kurdistan Region, Iraq' },
        { label: 'Working Hours', value: 'Sat–Thu, 8:00–18:00' },
      ],
    };
  }
}

</script>
</body>
</html>
