<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#F5F6F4; }
  a { color:#E2861B; }
  a:hover { color:#C96F0F; }
</style>
</helmet>
<div style="font-family:'IBM Plex Sans',sans-serif">
<dc-import name="Header" active-page="solutions" hint-size="100%,76px"></dc-import>

<section style="background:#0A1930;padding:72px 32px 56px">
  <div style="max-width:1280px;margin:0 auto">
    <div style="font-size:13px;font-weight:600;color:#F0A85B;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">Solutions</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;color:#fff;margin:0 0 16px;max-width:720px;line-height:1.2">Tell us your problem. We'll show you the solution.</h1>
    <p style="font-size:17px;color:rgba(255,255,255,.65);max-width:640px;line-height:1.6;margin:0">Browse by the challenge you're facing rather than product names.</p>
  </div>
</section>

<section style="max-width:1000px;margin:0 auto;padding:64px 32px 96px;display:flex;flex-direction:column;gap:16px">
  <sc-for list="{{ items }}" as="it" hint-placeholder-count="11">
    <div style="background:#fff;border:1px solid rgba(10,25,48,.08);border-radius:14px;padding:28px 30px">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#16212B;margin-bottom:8px">"{{ it.problem }}"</div>
      <div style="font-size:15px;color:#59677A;line-height:1.6;margin-bottom:16px">{{ it.solution }}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
        <sc-for list="{{ it.benefits }}" as="b" hint-placeholder-count="3">
          <span style="background:#FDF1E2;color:#C96F0F;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:16px">{{ b }}</span>
        </sc-for>
      </div>
      <a href="{{ it.href }}" style="font-size:13.5px;font-weight:600;color:#E2861B;text-decoration:none">See related product →</a>
    </div>
  </sc-for>
</section>

<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      items: [
        { problem: 'I need to control gas station sales.', solution: 'Gas Station POS gives cashiers a fast, accurate sales interface with shift management and daily closing.', benefits: ['Faster checkout', 'Fewer discrepancies'], href: 'Product-POS.dc.html' },
        { problem: 'I need to manage employee fuel limits.', solution: 'The Fuel Limit & Quota System sets daily, weekly, or custom allowances by employee, vehicle, or department.', benefits: ['Controlled spending', 'Approval workflows'], href: 'Product-Fuel-Quota.dc.html' },
        { problem: 'I need to track propane cylinders.', solution: 'Propane Cylinder Management tracks inventory, deposits, returns, and missing cylinders in real time.', benefits: ['Zero lost cylinders', 'Clear deposit tracking'], href: 'Product-Propane.dc.html' },
        { problem: 'I need to manage gas delivery to homes.', solution: 'Delivery Dispatch and the Customer Portal handle home orders, driver assignment, and delivery confirmation.', benefits: ['Live delivery status', 'Happier customers'], href: 'Product-Delivery-Dispatch.dc.html' },
        { problem: 'I need to manage gas delivery by tonnes.', solution: 'The Bulk Gas Delivery System manages contracts, scheduling, and invoicing for tonnage-based customers.', benefits: ['Contract visibility', 'Accurate invoicing'], href: 'Product-Bulk-Gas.dc.html' },
        { problem: 'I need ERP for my fuel company.', solution: 'The Fuel ERP Platform unifies customers, suppliers, stock, sales, and reporting across every branch.', benefits: ['Central reporting', 'Multi-branch control'], href: 'Product-Fuel-ERP.dc.html' },
        { problem: 'I need to protect my website and business systems.', solution: 'Cybersecurity Services harden your servers, admin panels, and ERP against modern threats.', benefits: ['Reduced risk', 'Incident response'], href: 'Cybersecurity.dc.html' },
        { problem: 'I need CCTV and physical security.', solution: 'CCTV & Physical Security covers camera installation, monitoring, and control-room setup for every site.', benefits: ['24/7 coverage', 'Central monitoring'], href: 'CCTV-Security.dc.html' },
        { problem: 'I need to track field staff and tasks by location.', solution: 'Location-Based Task Management assigns and verifies tasks using GPS check-ins and photo evidence.', benefits: ['Full field visibility', 'Verified visits'], href: 'Task-Management.dc.html' },
        { problem: 'I need maintenance tracking for equipment.', solution: 'Asset & Maintenance Management schedules preventive maintenance and tracks work orders and spare parts.', benefits: ['Less downtime', 'Lower repair cost'], href: 'Product-Asset-Maintenance.dc.html' },
        { problem: 'I need dashboards for owners and managers.', solution: 'The Business Intelligence Dashboard brings sales, delivery, security, and maintenance data into one view.', benefits: ['Faster decisions', 'One source of truth'], href: 'Product-BI-Dashboard.dc.html' },
      ],
    };
  }
}

</script>
</body>
</html>
